services:
  - type: web
    name: 8769bet-frontend
    env: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

  - type: web
    name: 8769bet-admin
    env: static
    branch: main
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: admin/dist

  - type: web
    name: 8769bet-backend
    env: node
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
